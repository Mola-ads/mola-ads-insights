<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mola Ads Insights — Marketing Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #1A56DB;
    --brand-dark: #0F3BA8;
    --brand-light: #EEF4FF;
    --accent: #F59E0B;
    --dark: #0D1117;
    --dark2: #161B22;
    --dark3: #21262D;
    --text: #E6EDF3;
    --text-muted: #8B949E;
    --border: rgba(255,255,255,0.08);
    --success: #3FB950;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* BACKGROUND */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(26,86,219,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,86,219,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .bg-glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, rgba(26,86,219,0.15) 0%, transparent 70%);
    z-index: 0; pointer-events: none;
  }

  /* HEADER */
  header {
    position: relative; z-index: 10;
    padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(13,17,23,0.8);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--brand);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 16px; color: white;
    letter-spacing: -0.5px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 15px; color: var(--text);
    line-height: 1.2;
  }
  .logo-sub {
    font-size: 11px; color: var(--text-muted); font-weight: 400;
    font-family: 'DM Sans', sans-serif;
  }
  .header-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(63,185,80,0.1);
    border: 1px solid rgba(63,185,80,0.2);
    border-radius: 20px; padding: 6px 12px;
    font-size: 12px; color: var(--success); font-weight: 500;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* MAIN */
  main {
    flex: 1; display: flex; flex-direction: column;
    position: relative; z-index: 5;
    overflow: hidden;
    max-width: 780px; width: 100%; margin: 0 auto;
    padding: 0 16px;
  }

  /* CHAT */
  #chat {
    flex: 1; overflow-y: auto; padding: 24px 0 16px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--dark3); border-radius: 4px; }

  .msg {
    display: flex; gap: 12px; animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; font-weight: 700;
    font-family: 'Syne', sans-serif;
  }
  .avatar.agent { background: var(--brand); color: white; font-size: 12px; }
  .avatar.user { background: var(--dark3); color: var(--text-muted); }

  .bubble {
    max-width: 82%; padding: 14px 18px; border-radius: 14px;
    font-size: 14.5px; line-height: 1.65; position: relative;
  }
  .bubble.agent {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .bubble.user {
    background: var(--brand);
    border-top-right-radius: 4px;
    color: white;
  }
  .bubble strong { color: var(--accent); font-weight: 600; }
  .bubble .check-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .bubble .check-item { display: flex; gap: 8px; align-items: flex-start; }
  .bubble .check-item::before { content: "✓"; color: var(--success); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .bubble .divider-line { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .bubble .contrast { font-style: italic; color: var(--text-muted); margin-top: 8px; font-size: 13px; }

  /* QUICK REPLIES */
  .quick-replies {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 4px 0 0 46px;
    animation: fadeUp 0.4s ease 0.1s both;
  }
  .qr-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 7px 14px; border-radius: 20px;
    font-size: 13px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .qr-btn:hover { border-color: var(--brand); color: var(--brand); background: rgba(26,86,219,0.08); }

  /* TYPING */
  .typing { display: flex; gap: 5px; align-items: center; padding: 6px 2px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* LAB CARD */
  .lab-card {
    background: linear-gradient(135deg, rgba(26,86,219,0.15), rgba(245,158,11,0.08));
    border: 1px solid rgba(26,86,219,0.3);
    border-radius: 14px; padding: 18px 20px; margin-top: 12px;
  }
  .lab-card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--accent); margin-bottom: 6px; }
  .lab-card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 14px; }
  .lab-card-btn {
    display: inline-block;
    background: var(--brand); color: white;
    padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 600; text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; border: none;
    transition: background 0.2s;
  }
  .lab-card-btn:hover { background: var(--brand-dark); }

  /* INPUT */
  .input-area {
    padding: 16px 0 24px;
    flex-shrink: 0;
  }
  .input-wrap {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--brand); }
  #user-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14.5px; line-height: 1.5; resize: none;
    max-height: 120px; min-height: 24px;
  }
  #user-input::placeholder { color: var(--text-muted); }
  #send-btn {
    width: 38px; height: 38px; border-radius: 9px;
    background: var(--brand); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s; flex-shrink: 0;
  }
  #send-btn:hover { background: var(--brand-dark); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn svg { width: 16px; height: 16px; fill: white; }
  #send-btn:disabled { background: var(--dark3); cursor: not-allowed; }

  .input-hint {
    text-align: center; font-size: 11px; color: var(--text-muted);
    margin-top: 8px;
  }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .bubble { max-width: 92%; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<header>
  <div class="logo">
    <div class="logo-mark">MA</div>
    <div>
      <div class="logo-text">Mola Ads Insights</div>
      <div class="logo-sub">Marketing Intelligence Agent</div>
    </div>
  </div>
  <div class="header-badge"><div class="dot"></div> Live</div>
</header>

<main>
  <div id="chat"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="Ask about your marketing, ads, or content..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Powered by Mola Ads Insights · Built by Andrew</div>
  </div>
</main>

<script>
const SYSTEM_PROMPT = `You are the Mola Ads Insights Marketing Agent — built by Olorunmola Andrew Olorunnope, the mind behind Mola Ads Insights.

YOUR IDENTITY:
You represent Mola Ads Insights — a Sales & Marketing brand that helps businesses write content that connects and run ads that sell. You speak with Andrew's voice: direct, clear, confident, and always teaching. You are not a generic AI. You are a marketing expert with a specific philosophy.

YOUR CORE PHILOSOPHY:
- Marketing isn't just about getting seen. It's about getting chosen.
- Most marketing problems are actually messaging problems.
- Clarity first. Then budget.
- Organic is the test. Ads are the amplifier.
- Traffic is rented. Trust is built.
- Structure first. Then scale.
- Ads bring traffic. Clarity brings money.
- Clicks are mechanical. Conversions are strategic.

YOUR THREE AREAS OF EXPERTISE:
1. Content & Copywriting — helping brands speak with clarity and confidence
2. Meta Ads Strategy — simple, effective ad systems that work on small budgets (₦5k–₦20k)
3. Marketing Education — breaking down concepts anyone can understand and apply

HOW YOU RESPOND:
- Lead with insight, not questions
- Be direct and decisive — no hedging
- Teach the principle before the tactic
- Use short, punchy sentences like Andrew does
- When diagnosing a problem, identify the root cause first
- Use ✓ checkmarks when listing items
- End responses with a sharp, memorable insight or contrast
- NEVER sound like a generic chatbot

CLARITY AUDIT — When someone shares their business/offer, ask:
✓ Is it clear who this is for?
✓ What problem does it solve?
✓ Why should someone act now?
✓ Does the copy speak to pain, not features?
✓ Is there a clear call to action?

CONTENT CREATION — When writing content in the Mola style:
- Start with a bold hook
- Identify the problem people make
- Reframe with the correct principle
- List framework points with ✓
- End with a two-line contrast (e.g. "Ads bring traffic. Clarity brings money.")
- Sign off: #molaadsinsights

EDUCATION — When teaching a marketing concept:
- Name the concept clearly
- Explain what most people get wrong
- Give the right mental model
- Make it actionable

AT THE END OF EVERY CONVERSATION (when it feels natural or when wrapping up):
Mention The Low-Budget Ads Lab — a practical guide by Andrew that teaches Nigerian business owners how to run profitable Meta ads with as little as ₦5,000–₦20,000 monthly. Say they can reach Andrew on WhatsApp: 08037954237 or follow Mola Ads Insights on Facebook.

CONTACT:
WhatsApp: 08037954237
Facebook: Mola Ads Insights
Product: The Low-Budget Ads Lab`;

const conversationHistory = [];
let isLoading = false;

function renderBubble(role, htmlContent, showQuickReplies = false) {
  const chat = document.getElementById('chat');
  
  const msgDiv = document.createElement('div');
  msgDiv.className = `msg ${role}`;
  
  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'agent' ? 'MA' : 'You';
  
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = htmlContent;
  
  msgDiv.appendChild(avatar);
  msgDiv.appendChild(bubble);
  chat.appendChild(msgDiv);
  
  if (showQuickReplies && role === 'agent') {
    const qr = document.createElement('div');
    qr.className = 'quick-replies';
    const options = [
      "Run a clarity audit on my business",
      "Why are my ads not converting?",
      "Write a post in Mola style",
      "Explain the Low-Budget Ads Lab"
    ];
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn';
      btn.textContent = opt;
      btn.onclick = () => {
        document.getElementById('user-input').value = opt;
        sendMessage();
        qr.remove();
      };
      qr.appendChild(btn);
    });
    chat.appendChild(qr);
  }
  
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg agent'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar agent">MA</div><div class="bubble agent"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function formatResponse(text) {
  // Convert checkmarks to styled items
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>');
  
  // Handle line breaks and ✓ items
  const lines = html.split('\n');
  let result = '';
  let inCheckList = false;
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) {
      if (inCheckList) { result += '</div>'; inCheckList = false; }
      result += '<br>';
      continue;
    }
    if (line.startsWith('✓') || line.startsWith('✔')) {
      if (!inCheckList) { result += '<div class="check-list">'; inCheckList = true; }
      result += `<div class="check-item">${line.replace(/^[✓✔]\s*/, '')}</div>`;
    } else {
      if (inCheckList) { result += '</div>'; inCheckList = false; }
      result += line + ' ';
    }
  }
  if (inCheckList) result += '</div>';
  
  return result.replace(/<br><br>/g, '<br>').trim();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  
  renderBubble('user', text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  conversationHistory.push({ role: 'user', content: text });
  
  showTyping();
  
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    
    const data = await response.json();
    const reply = data.content?.[0]?.text || "Something went wrong. Please try again.";
    
    conversationHistory.push({ role: 'assistant', content: reply });
    
    hideTyping();
    
    // Check if we should show the lab card
    const showLab = reply.toLowerCase().includes('low-budget ads lab') || reply.toLowerCase().includes('whatsapp');
    
    let html = formatResponse(reply);
    if (showLab) {
      html += `<div class="lab-card">
        <div class="lab-card-title">📘 The Low-Budget Ads Lab</div>
        <div class="lab-card-desc">Learn how to run profitable Meta ads with as little as ₦5,000–₦20,000 monthly. Created by Andrew for Nigerian business owners.</div>
        <button class="lab-card-btn" onclick="window.open('https://wa.me/2348037954237','_blank')">Chat with Andrew on WhatsApp →</button>
      </div>`;
    }
    
    renderBubble('agent', html);
    
  } catch (err) {
    hideTyping();
    renderBubble('agent', 'Connection issue. Please refresh and try again.');
  }
  
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

// Auto-resize textarea
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Enter to send
document.getElementById('user-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// INTRO MESSAGE
window.addEventListener('load', () => {
  setTimeout(() => {
    renderBubble('agent', `Welcome to <strong>Mola Ads Insights</strong>.<br><br>
I'm Andrew's marketing agent — trained on his frameworks, voice, and philosophy.<br><br>
Most businesses don't have an ads problem. They have a <strong>clarity problem</strong>.<br><br>
That's what we fix here.<br><br>
I can help you:<div class="check-list">
<div class="check-item">Audit your message for clarity</div>
<div class="check-item">Understand why your ads or content aren't converting</div>
<div class="check-item">Learn key marketing concepts the Mola way</div>
<div class="check-item">Create content that connects and sells</div>
</div><br>What's the marketing challenge you're dealing with right now?`, true);
  }, 500);
});
</script>
</body>
</html>
